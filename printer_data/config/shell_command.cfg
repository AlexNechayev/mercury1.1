[gcode_macro BACKUP_CONFIG]
description: Run Klipper-Backup to GitHub
gcode:
  {% set extra = params.TEXT|default("") %}
  {% if extra|length > 0 %}
    RUN_SHELL_COMMAND CMD=klipper_backup PARAMS="{extra}"
  {% else %}
    RUN_SHELL_COMMAND CMD=klipper_backup
  {% endif %}

[gcode_shell_command klipper_backup]
command: /home/biqu/Klipper-Backup/run_backup_with_message.sh
timeout: 600
verbose: True
