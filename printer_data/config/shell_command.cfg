[gcode_macro BACKUP_CONFIG]
description: Run Klipper-Backup to GitHub
gcode:
  {action_respond_info("Starting backup via Moonraker shell_command...")}
  {% set extra = params.TEXT|default("") %}
  {% if extra|length > 0 %}
    {action_call_remote_method("shell_command", name="klipper_backup", args=extra)}
  {% else %}
    {action_call_remote_method("shell_command", name="klipper_backup")}
  {% endif %}
  G4 S1
  {action_respond_info("Backup command dispatched. Check Moonraker logs/UI for result.")}
