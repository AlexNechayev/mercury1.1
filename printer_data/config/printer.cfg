[include mainsail.cfg]

[include moonraker_obico_macros.cfg]

[include shell_command.cfg]

[force_move]
enable_force_move: true

# host MCU service is preinstalled and ready to use with:
[mcu CB2]
serial: /tmp/klipper_host_mcu


[include Beacon.cfg]
[include btt-manta-m8p.cfg]
[include steppers.cfg]
[include canbus-ebb36.cfg]


[exclude_object]


[gcode_arcs]
resolution: 1.0
#   An arc will be split into segments. Each segment's length will
#   equal the resolution in mm set above. Lower values will produce a
#   finer arc, but also more work for your machine. Arcs smaller than
#   the configured value will become straight lines. The default is
#   1mm.


############################ [MACROS] ############################
# [include ./KAMP/KAMP_Settings.cfg]  # Include KAMP settings macro.
# [include ./Macros/Start_End.cfg]  # Include KAMP settings macro.
[include ./Macros/Klipper/index.cfg]  # Include KAMP settings macro.
[include ./Macros/Costume/index.cfg]  # Include KAMP settings macro.
##################################################################


[led caselight]
white_pin: PF5 # Replace with your actual MCU pin
cycle_time: 0.001
initial_WHITE: 1 # Initial state (0 = off, 1 = on)

